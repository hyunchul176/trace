  .seg button{border:0;background:transparent;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:var(--slate);padding:7px 13px;border-radius:7px;white-space:nowrap;}
  .seg button.active{background:var(--accent);color:#fff;}

  .searchwrap input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  select.sortsel{font:inherit;font-size:13.5px;font-weight:600;padding:8px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel);color:var(--ink);cursor:pointer;}
  .rowfilters{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;align-items:center;}
  .chip{border:1px solid var(--line-strong);background:var(--panel);color:var(--slate);border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}

  .chip.tog.on{background:var(--kr-soft);border-color:var(--kr);color:var(--kr);}
  .filterlabel{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-soft);font-weight:700;margin-right:2px;}
  .clearbtn{font-size:12.5px;font-weight:600;color:var(--slate);background:none;border:0;cursor:pointer;text-decoration:underline;}
  .countline{font-size:13px;color:var(--slate);margin:16px 0 4px;font-weight:500;}
  .countline b{color:var(--ink);font-weight:700;}

  .monthhdr{grid-column:1/-1;font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em;margin:16px 0 2px;padding-bottom:6px;border-bottom:1px solid var(--line-strong);display:flex;gap:9px;align-items:baseline;}

  .badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

  .note{font-size:13px;color:var(--slate);line-height:1.45;margin:0 0 10px;}

  .cfoot a{font-size:13px;font-weight:700;text-decoration:none;display:inline-flex;gap:5px;align-items:center;}
  .cfoot a.src{color:var(--slate-soft);font-weight:600;font-size:12px;}
  .cfoot a:hover{text-decoration:underline;}
  .empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--slate);}
  section.about{margin-top:56px;border-top:2px solid var(--ink);padding-top:26px;}

  .contribs{display:flex;flex-wrap:wrap;gap:14px;margin:18px 0 6px;}
  .person{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px 17px;min-width:250px;}
  .person .role{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
  .person .nm{font-size:16.5px;font-weight:700;}
  .person .aff{font-size:13px;color:var(--slate);margin-top:2px;}
  .person .lnks{margin-top:7px;display:flex;gap:12px;}
  .person a{font-size:13px;font-weight:600;text-decoration:none;}
  .person a:hover{text-decoration:underline;}
  .contribnote{font-size:13px;color:var(--slate);background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:12px 15px;margin-top:14px;max-width:75ch;}
  footer.foot{margin-top:30px;font-size:12.5px;color:var(--slate-soft);line-height:1.6;border-top:1px solid var(--line);padding-top:16px;}
  @media (max-width:640px){.grid{grid-template-columns:1fr;}.wrap{padding:22px 15px 70px;}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>

    }
    var rec=e.recurrence||"tbd";
    if(rec==="rolling") return {key:"rolling",pill:t.pRolling,sort:7e15,sub:t.dRolling,dl:null};
    if(rec==="one-time") return {key:"past",pill:t.pPast,sort:8e15,sub:t.dPastEd,dl:e.deadline||null};
    if(rec==="tbd") return {key:"tbd",pill:t.pTbd,sort:6.5e15,sub:t.dTbd,dl:null};
    var mon=parseMonth(rec);
    if(mon){ var nd=nextMonthDate(mon); return {key:"recurring",pill:t.pRecur+" · "+t.pNext+MONTHS[state.lang][mon-1],sort:nd.getTime()+1e11,sub:t.dNext+" ~"+MONTHS[state.lang][mon-1]+" "+nd.getFullYear(),dl:null}; }
    var recurLab = rec==="biennial"?(state.lang==="ko"?"격년":"Biennial"):rec==="triennial"?(state.lang==="ko"?"3년마다":"Triennial"):t.pRecur;
    return {key:"recurring",pill:recurLab,sort:6e15,sub:"",dl:null};
  }
  function matches(e){
    if(e.scope!==state.scope) return false;
    if(state.cat!=="all" && e.category!==state.cat) return false;
    if(state.fields.length){ var cg=coarseOf(e); if(!state.fields.some(function(g){return cg.indexOf(g)>=0;})) return false; }
    if(state.koreaOnly && e.restricted) return false;
    if(state.openOnly){ var s=computeStatus(e); if(s.key==="past"||s.key==="tbd") return false; }
    if(state.q){ var q=state.q.toLowerCase(); var hay=[e.title,e.titleKo||"",e.org,(e.fields||[]).join(" "),e.eligibilityNote||""].join(" ").toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function cardHTML(e){
    var t=UI[state.lang]; var s=computeStatus(e);
    var fields=coarseOf(e).map(function(g){return '<span class="ftag">'+esc(GROUPS[g][state.lang])+'</span>';}).join("");
    var titleko=(state.lang==="ko"&&e.titleKo)?'<div class="titleko">'+esc(e.titleKo)+'</div>':'';
    var dsub=s.sub?'<span class="dsub">'+esc(s.sub)+'</span>':'';
    var restricted=(e.restricted&&!state.koreaOnly)?' · <span class="restricted">'+esc(t.restricted)+'</span>':'';
    var prize=e.prize?'<div class="prize"><span class="k">'+esc(t.prizeK)+':</span> '+esc(e.prize)+'</div>':'';
    var flag=e.flag?'<div class="flag">'+esc(e.flag)+'</div>':'';
    var src=(e.source&&e.source!==e.url)?'<a class="src" href="'+esc(e.source)+'" target="_blank" rel="noopener">'+esc(t.sourceL)+' ↗</a>':'';
    return '<div class="card '+(s.key==="past"?"past":"")+'">'+
      '<div class="ctop"><div class="badges">'+
        '<span class="cat" data-cat="'+e.category+'">'+esc(t[e.category])+'</span>'+
        '<span class="scopetag '+e.scope+'">'+(e.scope==="korean"?esc(t.sKr):esc(t.sIntl))+'</span>'+
      '</div><span class="pill '+s.key+'">'+esc(s.pill)+'</span></div>'+
      '<div class="org">'+esc(e.org)+'</div><h3>'+esc(e.title)+'</h3>'+titleko+
      '<div class="dline"><span class="dl">'+(s.dl?esc(s.dl):(s.key==="rolling"?esc(t.pRolling):s.key==="tbd"?esc(t.pTbd):esc(t.pRecur)))+'</span>'+dsub+restricted+'</div>'+
      '<div class="frow">'+fields+'</div>'+
      (e.eligibilityNote?'<div class="note">'+esc(e.eligibilityNote)+'</div>':'')+prize+flag+
      '<div class="cfoot"><a href="'+esc(e.url)+'" target="_blank" rel="noopener">'+esc(t.official)+' →</a>'+src+'</div></div>';
  }
  function render(){
    var t=UI[state.lang];
    var list=DATA.filter(matches);
    if(state.sort==="name") list.sort(function(a,b){return a.title.localeCompare(b.title);});
    else if(state.sort==="verified") list.sort(function(a,b){return (b.verified||"").localeCompare(a.verified||"");});
    else list.sort(function(a,b){return computeStatus(a).sort-computeStatus(b).sort;});
    var grid=document.getElementById("grid");
    if(!list.length){ grid.innerHTML='<div class="empty"><div style="font-size:19px;font-weight:700;margin-bottom:6px">'+esc(t.emptyTitle)+'</div>'+esc(t.emptyBody)+'</div>'; }
    else if(state.sort==="month"){
      var groups={},order=[];
      list.forEach(function(e){var s=computeStatus(e);var key;
        if(s.key==="rolling"||s.key==="tbd"||s.key==="past"){key="~";}
        else{var d=new Date(s.sort);key=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2);}
        if(!groups[key]){groups[key]=[];order.push(key);} groups[key].push(e);});
      order.sort(function(a,b){if(a==="~")return 1;if(b==="~")return -1;return a<b?-1:1;});
      var html="";
      order.forEach(function(key){var lab;
        if(key==="~"){lab=state.lang==="ko"?"상시 · 미정 · 과거":"Rolling · TBA · Past";}
        else{var p=key.split("-");lab=MONTHS[state.lang][parseInt(p[1],10)-1]+" "+p[0];}
        html+='<div class="monthhdr">'+esc(lab)+'<span class="mc">'+groups[key].length+'</span></div>'+groups[key].map(cardHTML).join("");});
      grid.innerHTML=html;
    } else { grid.innerHTML=list.map(cardHTML).join(""); }
    document.getElementById("countline").innerHTML='<b>'+list.length+'</b>'+esc(t.results)+esc(t.of)+'<b>'+DATA.length+'</b>';
  }
  function chip(cls,n,l){return '<div class="schip '+cls+'"><span class="n">'+n+'</span><span class="l">'+esc(l)+'</span></div>';}
  function buildStatic(){
    var t=UI[state.lang];
    document.getElementById("tagline").innerHTML=t.tagline;
    document.getElementById("aboutlink").textContent=t.about;
    document.documentElement.lang=state.lang;
    document.getElementById("search").placeholder=t.searchPh;
    var kr=DATA.filter(function(e){return e.scope==="korean";}).length;
    var intln=DATA.length-kr;
    var openN=DATA.filter(function(e){var s=computeStatus(e);return s.key==="open"||s.key==="soon";}).length;
    var soonN=DATA.filter(function(e){return computeStatus(e).key==="soon";}).length;
    document.getElementById("summary").innerHTML=chip("",DATA.length,t.sTotal)+chip("intl",intln,t.sIntl)+chip("kr",kr,t.sKr)+chip("open",openN,t.sOpen)+chip("soon",soonN,t.sSoon);
    var sc=[["international",t.scopeIntl],["korean",t.scopeKr]];
    document.getElementById("segScope").innerHTML=sc.map(function(x){return '<button data-scope="'+x[0]+'" class="'+(state.scope===x[0]?"active":"")+'">'+esc(x[1])+'</button>';}).join("");
    var cats=[["all",t.catAll]].concat(CATS.map(function(c){return [c,t[c]];}));
    document.getElementById("segCat").innerHTML=cats.map(function(x){return '<button data-cat="'+x[0]+'" class="'+(state.cat===x[0]?"active":"")+'">'+esc(x[1])+'</button>';}).join("");
    var sorts=[["deadline",t.sortDeadline],["month",t.sortMonth],["name",t.sortName],["verified",t.sortVerified]];
    document.getElementById("sortsel").innerHTML=sorts.map(function(x){return '<option value="'+x[0]+'" '+(state.sort===x[0]?"selected":"")+'>'+esc(x[1])+'</option>';}).join("");
    var present={}; DATA.forEach(function(e){coarseOf(e).forEach(function(g){present[g]=1;});});
    var gkeys=GROUP_ORDER.filter(function(g){return present[g];});
    var fh='<span class="filterlabel">'+esc(t.fieldsLabel)+'</span>'+gkeys.map(function(g){return '<button class="chip fld '+(state.fields.indexOf(g)>=0?"on":"")+'" data-field="'+g+'">'+esc(GROUPS[g][state.lang])+'</button>';}).join("");
    if(state.fields.length||state.q||state.openOnly||state.koreaOnly||state.cat!=="all") fh+='<button class="clearbtn" id="clearBtn">'+esc(t.clear)+'</button>';
    document.getElementById("rowFields").innerHTML=fh;
    document.getElementById("rowToggles").innerHTML=
      '<button class="chip tog '+(state.openOnly?"on":"")+'" data-tog="openOnly">'+esc(t.togOpen)+'</button>'+
      '<button class="chip tog '+(state.koreaOnly?"on":"")+'" data-tog="koreaOnly">'+esc(t.togKorea)+'</button>';
    document.getElementById("aboutTitle").textContent=t.aboutTitle;
    document.getElementById("aboutBody").textContent=t.aboutBody;
    document.getElementById("roleAdvisor").textContent=t.roleAdvisor;
    document.getElementById("affAdvisor").textContent=t.affAdvisor;
    document.getElementById("roleMaker").textContent=t.roleMaker;
    document.getElementById("affMaker").textContent=t.affMaker;
    document.getElementById("contribNote").textContent=t.contribNote;
    document.getElementById("foot").innerHTML=t.foot;
    document.querySelectorAll(".lang button").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-lang")===state.lang);});
  }
  document.addEventListener("click",function(ev){
    var el=ev.target;
    if(el.matches(".lang button")){state.lang=el.getAttribute("data-lang");buildStatic();render();}
    else if(el.matches("#segScope button")){state.scope=el.getAttribute("data-scope");buildStatic();render();}
    else if(el.matches("#segCat button")){state.cat=el.getAttribute("data-cat");buildStatic();render();}
    else if(el.matches(".chip.fld")){var f=el.getAttribute("data-field");var i=state.fields.indexOf(f);if(i>=0)state.fields.splice(i,1);else state.fields.push(f);buildStatic();render();}
    else if(el.matches(".chip.tog")){var k=el.getAttribute("data-tog");state[k]=!state[k];buildStatic();render();}
    else if(el.matches("#clearBtn")){state.fields=[];state.q="";state.openOnly=false;state.koreaOnly=false;state.cat="all";document.getElementById("search").value="";buildStatic();render();}
  });
  document.getElementById("search").addEventListener("input",function(e){state.q=e.target.value;render();});
  document.getElementById("sortsel").addEventListener("change",function(e){state.sort=e.target.value;render();});
  buildStatic(); render();
};
</script>
<script>fetch('./data.json').then(function(r){return r.json();}).then(function(d){window.DATA=d;window.__traceInit();}).catch(function(err){document.getElementById('grid').innerHTML='<div class=\'empty\'>Failed to load data.json: '+err+'</div>';});</script>
</body>
</html>
