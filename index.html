<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TRACE — Transportation Research: Awards, Challenges & Events</title>
<meta name="description" content="A curated hub of awards, challenges, fellowships and datasets for transportation and mobility research — autonomous driving included, Korean and international.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --ground:#F7F8FB; --panel:#FFFFFF; --ink:#161A24; --slate:#464C5E;
    --slate-soft:#697083; --line:#E6E8EF; --line-strong:#D2D6E1;
    --accent:#284BC9; --accent-ink:#1B347F; --accent-soft:#EAEEFB;
    --kr:#0E7C66; --kr-soft:#E2F3EE; --intl:#4B4291; --intl-soft:#ECEAF9;
    --open:#12795A; --open-bg:#E4F3EC; --soon:#A45B0C; --soon-bg:#FAECD9;
    --recur:#3357C4; --recur-bg:#E9EEFC; --roll:#5B6478; --roll-bg:#EEF0F5;
    --tbd:#6C5FB0; --tbd-bg:#EFEBFA; --past:#9298A8; --past-bg:#F0F1F5;
    --c-award:#A6741C; --c-challenge:#C24A2C; --c-fellowship:#0E7C66; --c-dataset:#3552BE; --c-workshop:#6A4FB0;
    --sans:'Pretendard','Pretendard Variable',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'Pretendard','Pretendard Variable',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html{scrollbar-gutter:stable;}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:17px;font-weight:450;line-height:1.58;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word;font-variant-numeric:tabular-nums;}
  .wrap{max-width:1160px;margin:0 auto;padding:22px 22px 90px;}
  a{color:var(--accent);}
  /* site header: nav + subnav + hero */
  .site{border-bottom:1px solid var(--line);}
  .navbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0 12px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;gap:2px;text-decoration:none;cursor:pointer;}
  .brand .bw{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1;}
  .brand .bw .dot{color:var(--accent);}
  .brand .bs{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--slate-soft);}
  .navright{display:flex;align-items:center;gap:11px;}
  .navghost{display:inline-flex;align-items:center;gap:6px;background:none;border:0;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--slate);padding:6px 4px;}
  .navghost:hover{color:var(--accent);}
  .navghost .svgi{width:17px;height:17px;}
  .btn-primary{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:10px 16px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px -8px rgba(40,75,201,.55);}
  .btn-primary:hover{background:var(--accent-ink);}
  .btn-primary .svgi{width:17px;height:17px;}
  .ghicon{display:inline-grid;place-items:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--line-strong);color:var(--ink);text-decoration:none;flex:none;}
  .ghicon:hover{border-color:var(--accent);color:var(--accent);}
  .ghicon .svgi{width:18px;height:18px;}
  .subnav{display:flex;align-items:center;gap:2px;flex-wrap:wrap;}
  .subnav-sep{width:1px;height:16px;background:var(--line-strong);margin:0 10px;}
  .scopenav,.catnav{display:flex;gap:2px;flex-wrap:wrap;}
  .navtab{background:none;border:0;cursor:pointer;font:inherit;font-size:14.5px;font-weight:600;color:var(--slate);padding:11px 11px;border-bottom:2.5px solid transparent;line-height:1;}
  .navtab:hover{color:var(--ink);}
  .navtab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
  .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:center;padding:30px 0 34px;}
  .hero-text h1{font-size:clamp(30px,4.2vw,45px);font-weight:800;line-height:1.2;letter-spacing:-.02em;margin:0 0 16px;color:var(--ink);}
  .hero-text h1 .acc{color:var(--accent);}
  .hero-text p{font-size:16px;color:var(--slate);line-height:1.6;margin:0;max-width:46ch;}
  .hero-art{min-width:0;}
  .hero-art svg{width:100%;height:auto;max-height:290px;display:block;}
  @media(max-width:840px){.hero{grid-template-columns:1fr;padding:22px 0 24px;}.hero-art{display:none;}}
  .cta-banner{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin:36px 0 6px;padding:22px 26px;border-radius:18px;background:linear-gradient(120deg,#17296B 0%,#243B86 62%,#3A2E86 100%);color:#fff;}
  .cta-left{display:flex;align-items:center;gap:16px;}
  .cta-ic{flex:none;width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.14);display:grid;place-items:center;}
  .cta-ic .svgi{width:24px;height:24px;color:#fff;}
  .cta-tt{font-size:17px;font-weight:800;}
  .cta-sub{font-size:13.5px;color:rgba(255,255,255,.76);margin-top:3px;}
  .btn-light{background:#fff;color:var(--accent-ink);border:0;border-radius:10px;padding:11px 18px;font:inherit;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;}
  .btn-light:hover{background:#EEF1FB;}
  .tabs{display:flex;gap:2px;flex-wrap:wrap;flex:1;justify-content:center;}
  .hero-eyebrow{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.01em;color:var(--accent-ink);background:var(--accent-soft);border-radius:999px;padding:5px 13px;margin-bottom:16px;}
  .spotlight{display:grid;grid-template-columns:1.7fr 1fr;gap:18px;margin:6px 0 8px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
  .panel-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .panel-t{font-size:15px;font-weight:800;color:var(--ink);}
  .panel-more{background:none;border:0;cursor:pointer;font:inherit;font-size:12.5px;font-weight:700;color:var(--slate);}
  .panel-more:hover{color:var(--accent);}
  .rec-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .rec-card{border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;border-left:4px solid var(--cc,var(--line-strong));transition:border-color .15s,transform .15s,box-shadow .15s;}
  .rec-card:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 8px 20px -14px rgba(22,26,36,.4);}
  .rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .rec-card .ctile{width:34px;height:34px;border-radius:9px;}
  .rec-card .ctile .svgi{width:18px;height:18px;}
  .rec-card h4{font-size:14px;font-weight:700;margin:0 0 9px;line-height:1.3;letter-spacing:-.01em;}
  .rc-reason{font-size:12px;color:var(--slate);line-height:1.4;}
  .rc-rl{display:block;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--slate-soft);margin-bottom:2px;}
  .due-list{display:flex;flex-direction:column;}
  .due-row{display:flex;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .due-row:last-child{border-bottom:0;}
  .due-row:hover .due-name{color:var(--accent);}
  .due-d{flex:none;font-size:13px;font-weight:800;color:var(--accent);width:50px;font-variant-numeric:tabular-nums;}
  .due-info{min-width:0;}
  .due-date{font-size:11px;color:var(--slate-soft);font-weight:600;}
  .due-name{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.3;}
  @media(max-width:860px){.spotlight{grid-template-columns:1fr;}.rec-cards{grid-template-columns:1fr;}}
  header.top{border-bottom:2px solid var(--ink);padding-bottom:20px;}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;gap:6px;cursor:pointer;}
  .wordmark{font-size:clamp(34px,6vw,54px);font-weight:800;letter-spacing:-0.03em;line-height:.9;margin:0;}
  .wordmark .dot{color:var(--accent);}
  .tagline{font-size:14px;color:var(--slate);font-weight:500;}
  .tagline b{color:var(--ink);font-weight:700;}
  .toptools{display:flex;gap:10px;align-items:center;flex-wrap:nowrap;justify-content:flex-end;}
  .lang{display:inline-flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;font-family:var(--mono);font-size:12px;}
  .lang button{border:0;background:transparent;cursor:pointer;padding:7px 13px;color:var(--slate);font:inherit;}
  .lang button.active{background:var(--ink);color:#fff;}
  .tlink{font-size:13px;font-weight:600;color:var(--slate);text-decoration:none;border:1px solid var(--line-strong);border-radius:999px;padding:7px 13px;display:inline-flex;gap:6px;align-items:center;}
  .tlink:hover{border-color:var(--accent);color:var(--accent);}
  .tlink.gh{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tlink.gh:hover{background:#000;}
  .summary{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0 6px;}
  .schip{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;gap:9px;align-items:baseline;}
  .schip .n{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
  .schip .l{font-size:12.5px;color:var(--slate);font-weight:500;}
  .schip.kr .n{color:var(--kr);} .schip.intl .n{color:var(--intl);} .schip.open .n{color:var(--open);} .schip.soon .n{color:var(--soon);}
  .controls{background:var(--ground);padding:16px 0 6px;margin-top:8px;border-bottom:1px solid var(--line);}
  .rowseg{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line-strong);border-radius:10px;padding:3px;gap:2px;}
  .seg button{border:0;background:transparent;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:var(--slate);padding:7px 13px;border-radius:7px;white-space:nowrap;}
  .seg button.active{background:var(--accent);color:#fff;}
  .seg.scope button.active[data-scope="korean"]{background:var(--kr);}
  .seg.scope button.active[data-scope="international"]{background:var(--intl);}
  .searchwrap{position:relative;flex:1;min-width:180px;}
  .searchwrap input{width:100%;font:inherit;font-size:14.5px;padding:9px 13px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel);color:var(--ink);}
  .searchwrap input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  select.sortsel,select.monthsel{font:inherit;font-size:13.5px;font-weight:600;padding:8px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel);color:var(--ink);cursor:pointer;}
  .recobtn{font:inherit;font-size:13.5px;font-weight:700;padding:8px 15px;border:0;border-radius:9px;background:var(--accent);color:#fff;cursor:pointer;}
  .recobtn:hover{background:var(--accent-ink);}
  .rowfilters{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;align-items:center;}
  .chip{border:1px solid var(--line-strong);background:var(--panel);color:var(--slate);border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink);}
  .chip.tog.on{background:var(--kr-soft);border-color:var(--kr);color:var(--kr);}
  .chip.cr.on{background:#f0eafb;border-color:#5a4aa2;color:#5a4aa2;}
  .filterlabel{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-soft);font-weight:700;margin-right:2px;}
  .clearbtn{font-size:12.5px;font-weight:600;color:var(--slate);background:none;border:0;cursor:pointer;text-decoration:underline;}
  .countline{font-size:13px;color:var(--slate);margin:16px 0 4px;font-weight:500;}
  .countline b{color:var(--ink);font-weight:700;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px;margin-top:10px;}
  .monthhdr{grid-column:1/-1;font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em;margin:16px 0 2px;padding-bottom:6px;border-bottom:1px solid var(--line-strong);display:flex;gap:9px;align-items:baseline;}
  .monthhdr .mc{font-family:var(--mono);font-size:12px;color:var(--slate-soft);font-weight:600;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 19px 16px;display:flex;flex-direction:column;transition:border-color .16s,box-shadow .16s,transform .16s;cursor:pointer;}
  .card:hover{border-color:var(--accent);box-shadow:0 6px 22px -14px rgba(22,26,36,.34);transform:translateY(-1px);}
  .card.past{opacity:.72;}
  .ctop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:9px;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .cat{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:var(--accent-soft);color:var(--accent-ink);}
  .cat[data-cat="challenge"]{background:#fdeede;color:#9a5a10;} .cat[data-cat="fellowship"]{background:#e7f4ee;color:#0f6f52;}
  .cat[data-cat="dataset"]{background:#eef0f5;color:#4a5162;} .cat[data-cat="workshop"]{background:#f0eafb;color:#5a4aa2;}
  .scopetag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
  .scopetag.korean{background:var(--kr-soft);color:var(--kr);} .scopetag.international{background:var(--intl-soft);color:var(--intl);}
  .pill{font-size:11.5px;font-weight:700;font-family:var(--mono);padding:4px 9px;border-radius:999px;white-space:nowrap;}
  .pill.open{color:var(--open);background:var(--open-bg);} .pill.soon{color:var(--soon);background:var(--soon-bg);}
  .pill.recurring{color:var(--recur);background:var(--recur-bg);} .pill.rolling{color:var(--roll);background:var(--roll-bg);}
  .pill.tbd{color:var(--tbd);background:var(--tbd-bg);} .pill.past{color:var(--past);background:var(--past-bg);}
  .org{font-size:12px;color:var(--slate-soft);font-weight:700;letter-spacing:.03em;margin-bottom:3px;}
  .card h3{font-size:19px;font-weight:700;margin:0 0 3px;line-height:1.25;letter-spacing:-.01em;}
  .titleko{font-size:13.5px;color:var(--slate);font-weight:500;margin-bottom:9px;}
  .forwho{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:8px;padding:7px 11px;margin:4px 0 11px;line-height:1.3;}
  .forwho .fw-l{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);opacity:.85;flex:none;}
  .detail .forwho{font-size:15px;margin:12px 0;padding:10px 14px;}
  .dline{display:flex;gap:9px;align-items:baseline;margin:6px 0 10px;flex-wrap:wrap;}
  .dl{font-family:var(--mono);font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;}
  .dsub{font-family:var(--mono);font-size:12px;color:var(--slate);}
  .frow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .ftag{font-size:11px;font-weight:600;color:var(--slate);background:var(--ground);border:1px solid var(--line);border-radius:5px;padding:2px 7px;}
  .note{font-size:13.5px;color:var(--slate);line-height:1.5;margin:0 0 11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .detail .note{-webkit-line-clamp:unset;display:block;}
  .prize{font-size:12.5px;color:var(--ink);font-weight:600;margin:0 0 10px;}
  .prize .k{color:var(--slate-soft);font-weight:700;}
  .flag{font-size:12px;color:var(--soon);background:var(--soon-bg);border-radius:7px;padding:6px 9px;margin:0 0 10px;line-height:1.4;}
  .restricted{font-size:11.5px;font-weight:700;color:var(--intl);}
  .cfoot{margin-top:auto;display:flex;gap:14px;align-items:center;padding-top:4px;}
  .cfoot a{font-size:13px;font-weight:700;text-decoration:none;display:inline-flex;gap:5px;align-items:center;}
  .cfoot a.src{color:var(--slate-soft);font-weight:600;font-size:12px;}
  .cfoot a:hover{text-decoration:underline;}
  /* category identity */
  .cat-award{--cc:var(--c-award);} .cat-challenge{--cc:var(--c-challenge);} .cat-fellowship{--cc:var(--c-fellowship);} .cat-dataset{--cc:var(--c-dataset);} .cat-workshop{--cc:var(--c-workshop);}
  .secband{margin:30px 0 14px;}
  .secband:first-child{margin-top:8px;}
  .sec-h{display:flex;align-items:center;gap:11px;border-bottom:2.5px solid var(--cc);padding-bottom:8px;}
  .sec-name{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--cc);}
  .sec-count{font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;background:var(--cc);border-radius:999px;padding:2px 10px;}
  .sec-desc{font-size:13px;color:var(--slate);margin-top:6px;}
  /* toolbar: recommender card + filters */
  .svgi{display:block;width:16px;height:16px;flex:none;}
  .toolbar{display:flex;gap:16px;align-items:stretch;margin-top:14px;flex-wrap:wrap;}
  .recocard{flex:none;width:296px;max-width:100%;display:flex;align-items:center;gap:14px;text-align:left;border:0;cursor:pointer;border-radius:16px;padding:16px 18px;color:#fff;background:linear-gradient(135deg,#1E3A8A 0%,#3B2E86 100%);box-shadow:0 12px 30px -16px rgba(30,40,110,.75);font:inherit;transition:transform .16s,box-shadow .16s;}
  .recocard:hover{transform:translateY(-1px);box-shadow:0 16px 36px -16px rgba(30,40,110,.85);}
  .recocard .ricon{flex:none;width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.15);display:grid;place-items:center;}
  .recocard .ricon .svgi{width:25px;height:25px;color:#fff;}
  .recocard .rtxt{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
  .recocard .rt{font-size:16px;font-weight:800;letter-spacing:-.01em;}
  .recocard .rs{font-size:12px;color:rgba(255,255,255,.74);line-height:1.35;font-weight:500;}
  .recocard .rchev .svgi{width:20px;height:20px;color:rgba(255,255,255,.55);}
  .filters{flex:1;min-width:280px;display:flex;flex-direction:column;gap:9px;justify-content:center;}
  .filters .rowfilters{margin-top:0;}
  .countbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:20px 0 6px;}
  .muted{color:var(--slate-soft);font-weight:600;}
  /* refined card */
  .card{padding:16px 18px 14px;border-radius:14px;border-left:4px solid var(--cc,var(--line-strong));}
  .chead{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
  .ctile{flex:none;width:44px;height:44px;border-radius:12px;position:relative;overflow:hidden;display:grid;place-items:center;background:color-mix(in srgb,var(--cc) 14%,#fff);color:var(--cc);}
  .ctile .svgi{width:23px;height:23px;}
  .ctile img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;padding:7px;}
  .chbody{flex:1;min-width:0;}
  .chrow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .ceyebrow{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;line-height:1.4;}
  .ceyebrow .cn{color:var(--cc);}
  .ceyebrow .sc{color:var(--slate-soft);font-weight:600;}
  .chbody h3{font-size:18px;font-weight:800;margin:3px 0 0;line-height:1.28;letter-spacing:-.015em;}
  .cicon{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--cc) 13%,#fff);color:var(--cc);}
  .cicon .svgi{width:17px;height:17px;}
  .cscope{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-soft);}
  .chev{color:var(--slate-soft);display:grid;place-items:center;transition:transform .15s,color .15s;}
  .chev .svgi{width:19px;height:19px;}
  .card:hover .chev{color:var(--accent);transform:translateX(2px);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px;}
  .chip-s{font-size:11.5px;font-weight:600;color:var(--slate);background:var(--ground);border:1px solid var(--line);border-radius:7px;padding:3px 9px;}
  .chip-s.st{color:var(--cc);background:color-mix(in srgb,var(--cc) 9%,#fff);border-color:color-mix(in srgb,var(--cc) 24%,#fff);font-weight:700;}

    else if(state.sort==="month"){
      var groups={},order=[];
      list.forEach(function(e){var s=computeStatus(e);var key;if(s.key==="rolling"||s.key==="tbd"||s.key==="past"){key="~";}else{var d=new Date(s.sort);key=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2);}if(!groups[key]){groups[key]=[];order.push(key);}groups[key].push(e);});
      order.sort(function(a,b){if(a==="~")return 1;if(b==="~")return -1;return a<b?-1:1;});
      var inner="";order.forEach(function(key){var lab;if(key==="~"){lab=state.lang==="ko"?"상시 · 미정 · 과거":"Rolling · TBA · Past";}else{var p=key.split("-");lab=MONTHS[state.lang][parseInt(p[1],10)-1]+" "+p[0];}inner+='<div class="monthhdr">'+esc(lab)+'<span class="mc">'+groups[key].length+'</span></div>'+groups[key].map(cardHTML).join("");});
      html='<div class="grid">'+inner+'</div>';
    }
    else if(state.cat==="all"){
      CATS.forEach(function(c){var items=list.filter(function(e){return e.category===c;});if(!items.length)return;html+='<div class="secband cat-'+c+'"><div class="sec-h"><span class="sec-name">'+esc(t[c])+'</span><span class="sec-count">'+items.length+'</span></div><div class="sec-desc">'+esc(CATDESC[c][state.lang])+'</div></div><div class="grid">'+items.map(cardHTML).join("")+'</div>';});
    }
    else { html='<div class="grid">'+list.map(cardHTML).join("")+'</div>'; }
    box.innerHTML=html;
    var cl=esc(t.countPre)+'<b>'+list.length+'</b>'+esc(t.countUnit);
    if(list.length<DATA.length) cl+=' <span class="muted">('+esc(t.countOf)+' '+DATA.length+')</span>';
    document.getElementById("countline").innerHTML=cl;
  }

  // ---- detail ----
  function detailHTML(e){
    var t=UI[state.lang]; var s=computeStatus(e);
    var badges='<span class="cicon cat-'+e.category+'">'+catIcon(e.category)+'</span><span class="cat" data-cat="'+e.category+'">'+esc(t[e.category])+'</span><span class="scopetag '+e.scope+'">'+(e.scope==="korean"?esc(t.sKr):esc(t.sIntl))+'</span><span class="pill '+s.key+'">'+esc(s.pill)+'</span>';
    var big='<span class="dl">'+esc(shortWhen(e,s)||t.pRecur)+'</span>';
    var fields=coarseOf(e).map(function(g){return esc(GROUPS[g][state.lang]);}).join(", ");
    var careers=esc(careerShort(e));
    var regions=(e.regions||[]).map(function(r){return REGIONS[r]?esc(REGIONS[r][state.lang]):esc(r);}).join(", ");
    var meta='<dl class="dmeta">';
    if(e.eligibilityNote) meta+='<dt>'+esc(t.kElig)+'</dt><dd>'+esc(e.eligibilityNote)+'</dd>';
    if(e.prize) meta+='<dt>'+esc(t.prizeK)+'</dt><dd>'+esc(e.prize)+'</dd>';
    meta+='<dt>'+esc(t.kFor)+'</dt><dd>'+(careers||t.kNone)+'</dd>';
    meta+='<dt>'+esc(t.kFields)+'</dt><dd>'+(fields||t.kNone)+'</dd>';
    meta+='<dt>'+esc(t.kRegions)+'</dt><dd>'+(regions||t.kNone)+'</dd>';
    meta+='<dt>'+esc(t.kMemb)+'</dt><dd>'+(e.membershipRequired?esc(e.membershipRequired):t.kNone)+'</dd>';
    meta+='<dt>'+esc(t.kVerified)+'</dt><dd>'+esc(e.verified||t.kNone)+'</dd>';
    meta+='</dl>';
    var flag=e.flag?'<div class="flag">'+esc(e.flag)+'</div>':'';
    // trust
    var trust='';
    var hasTrust=(e.pastDeadlines&&e.pastDeadlines.length)||(e.pastWinners&&e.pastWinners.length)||e.selectivity;
    if(hasTrust){
      trust='<div class="trustbox">';
      if(e.pastDeadlines&&e.pastDeadlines.length) trust+='<div><b>'+esc(t.tDeadlines)+':</b> '+esc(e.pastDeadlines.join(", "))+'</div>';
      if(e.pastWinners&&e.pastWinners.length) trust+='<div><b>'+esc(t.tWinners)+':</b> '+esc(e.pastWinners.join("; "))+'</div>';
      if(e.selectivity) trust+='<div><b>'+esc(t.tSelect)+':</b> '+esc(e.selectivity)+'</div>';
      trust+='</div>';
    } else {
      trust='<div class="trustbox"><span class="contribute">'+esc(t.trustContribute)+'<a href="https://github.com/hyunchul176/trace/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">'+esc(t.trustContribLink)+'</a>.</span></div>';
    }
    var rel=relatedOf(e);
    var relHTML=rel.length?'<div class="dsection"><h3>'+esc(t.relatedTitle)+'</h3><div class="relgrid">'+rel.map(function(o){return '<div class="relcard" data-id="'+esc(o.id)+'"><div class="rc">'+esc(t[o.category])+'</div><div class="rt">'+esc(o.title)+'</div></div>';}).join("")+'</div></div>':'';
    return '<button class="dback" id="dback">'+esc(t.dback)+'</button>'+
      '<div class="dhead">'+badges+'</div>'+
      '<div class="dorg cat-'+e.category+'">'+logoHTML(e)+'<span>'+esc(e.org)+'</span></div>'+
      '<h2>'+esc(e.title)+'</h2>'+((e.titleKo&&state.lang==="ko")?'<div class="dko">'+esc(e.titleKo)+'</div>':'')+
      '<div class="whatis">'+esc(oneLiner(e))+'</div>'+
      '<div class="forwho"><span class="fw-l">'+esc(t.forWho)+'</span>'+esc(careerShort(e))+'</div>'+
      '<div class="dbig">'+big+'</div>'+flag+meta+
      '<div class="dactions"><a class="dbtn primary" href="'+esc(e.url)+'" target="_blank" rel="noopener">'+esc(t.official)+' →</a>'+
      ((e.source&&e.source!==e.url)?'<a class="dbtn" href="'+esc(e.source)+'" target="_blank" rel="noopener">'+esc(t.sourceL)+' ↗</a>':'')+
      '<button class="dbtn" id="shareBtn" data-def="'+esc(t.share)+'">'+esc(t.share)+'</button></div>'+
      '<div class="dsection"><h3>'+esc(t.trustTitle)+'</h3>'+trust+'</div>'+relHTML;
  }
  function showDetail(e){
    document.getElementById("listview").style.display="none";
    var d=document.getElementById("detail"); d.style.display=""; d.innerHTML=detailHTML(e);
    document.title=e.title+" — TRACE";
    window.scrollTo(0,0);
  }
  function showList(){
    document.getElementById("detail").style.display="none";
    document.getElementById("listview").style.display="";
    document.title=BASE_TITLE;
    render();
  }
  function route(){
    var h=location.hash||""; var m=/^#\/o\/(.+)$/.exec(h);
    if(m){var e=byId(decodeURIComponent(m[1]));if(e){showDetail(e);return;}}
    showList();
  }
  function nav(h){location.hash=h;route();}

  // ---- recommender ----
  var reco={scope:"",careers:[],fields:[],cat:"",openOnly:false,koreaOnly:false};
  function openReco(){
    var t=UI[state.lang];
    reco={scope:state.scope||"",careers:[],fields:[],cat:"",openOnly:false,koreaOnly:false};
    var m=document.getElementById("recoModal");
    var scopeChips=[["","recoAny"],["international","scopeIntl"],["korean","scopeKr"]].map(function(x){return '<button class="chip rsc" data-v="'+x[0]+'">'+esc(t[x[1]])+'</button>';}).join("");
    var carChips=CGROUP_ORDER.map(function(g){return '<button class="chip rcar" data-v="'+g+'">'+esc(CGROUPS[g][state.lang])+'</button>';}).join("");
    var fldChips=GROUP_ORDER.map(function(g){return '<button class="chip rfld" data-v="'+g+'">'+esc(GROUPS[g][state.lang])+'</button>';}).join("");
    var catChips=[["","recoAny"]].concat(CATS.map(function(c){return [c,c];})).map(function(x){return '<button class="chip rcat" data-v="'+x[0]+'">'+esc(x[1]?t[x[1]]:t.recoAny)+'</button>';}).join("");
    m.innerHTML='<div class="modal-card"><h2>'+esc(t.recoTitle)+'</h2><div class="sub">'+esc(t.recoSub)+'</div>'+
      '<div class="rstep"><div class="rl">'+esc(t.recoScope)+'</div><div class="rchips" id="rScope">'+scopeChips+'</div></div>'+
      '<div class="rstep"><div class="rl">'+esc(t.recoCareer)+'</div><div class="rchips" id="rCar">'+carChips+'</div></div>'+
      '<div class="rstep"><div class="rl">'+esc(t.recoFields)+'</div><div class="rchips" id="rFld">'+fldChips+'</div></div>'+
      '<div class="rstep"><div class="rl">'+esc(t.recoCat)+'</div><div class="rchips" id="rCat">'+catChips+'</div></div>'+
      '<div class="rstep"><div class="rchips"><button class="chip tog rtog" data-k="openOnly">'+esc(t.recoOpenTog)+'</button></div></div>'+
      '<div class="rresults" id="rResults"></div>'+
      '<div class="modal-actions"><button class="dbtn" id="rClose">'+esc(t.recoClose)+'</button><button class="dbtn primary" id="rRun">'+esc(t.recoRun)+'</button></div></div>';
    m.style.display="flex";
    // preselect scope chip
    m.querySelectorAll(".rsc").forEach(function(b){if(b.getAttribute("data-v")===reco.scope)b.classList.add("on");});
  }
  function closeReco(){document.getElementById("recoModal").style.display="none";}
  function runReco(){
    var t=UI[state.lang];
    var cand=DATA.filter(function(e){
      if(reco.scope && e.scope!==reco.scope) return false;
      if(reco.cat && e.category!==reco.cat) return false;
      if(reco.koreaOnly && e.restricted) return false;
      if(reco.openOnly){var s=computeStatus(e);if(s.key==="past"||s.key==="tbd")return false;}
      return true;
    });
    function score(e){var sc=0;var cg=coarseOf(e);reco.fields.forEach(function(g){if(cg.indexOf(g)>=0)sc+=2;});if(careerMatch(e,reco.careers)&&reco.careers.length)sc+=2;var st=computeStatus(e);if(st.key==="open"||st.key==="soon")sc+=1;return sc;}
    cand.forEach(function(e){e.__sc=score(e);});
    cand.sort(function(a,b){if(b.__sc!==a.__sc)return b.__sc-a.__sc;return computeStatus(a).sort-computeStatus(b).sort;});
    var top=cand.slice(0,12);
    var box=document.getElementById("rResults");
    if(!top.length){box.innerHTML='<div style="color:var(--slate);padding:8px 0">'+esc(t.recoNone)+'</div>';return;}
    box.innerHTML=top.map(function(e){
      var cg=coarseOf(e).filter(function(g){return reco.fields.indexOf(g)>=0;}).map(function(g){return GROUPS[g][state.lang];});
      var why=cg.length?(t.recoWhy+": "+esc(cg.join(", "))):"";
      var st=computeStatus(e);
      return '<div class="rrow" data-id="'+esc(e.id)+'"><div class="rt">'+esc(e.title)+'</div><div class="rm">'+esc(e.org)+' · '+esc(t[e.category])+' · '+esc(st.pill)+'</div>'+(why?'<div class="rw">'+why+'</div>':'')+'</div>';
    }).join("");
  }

  function chip(cls,n,l){return '<div class="schip '+cls+'"><span class="n">'+n+'</span><span class="l">'+esc(l)+'</span></div>';}
  function renderSpotlight(){
    var t=UI[state.lang];
    var withD=DATA.map(function(e){return {e:e,s:computeStatus(e)};}).filter(function(x){return x.s.key==="open"||x.s.key==="soon"||x.s.key==="recurring";}).sort(function(a,b){return a.s.sort-b.s.sort;});
    document.getElementById("recTitle").textContent=t.recTitle;
    document.getElementById("recMore").textContent=t.recMore+" ›";
    document.getElementById("dueTitle").textContent=t.dueTitle;
    document.getElementById("dueAll").textContent=t.dueAll+" ›";
    var catKo={award:"어워드",challenge:"챌린지",fellowship:"펠로우십",dataset:"데이터셋",workshop:"워크샵"};
    document.getElementById("recCards").innerHTML=withD.slice(0,3).map(function(x){var e=x.e,s=x.s;var days=Math.max(0,Math.round((s.sort-today)/MS_DAY));var reason=(s.key==="open"||s.key==="soon")?(state.lang==="ko"?("마감 D-"+days+" · 지금 지원 가능"):("Open now · D-"+days)):(state.lang==="ko"?("매년 열리는 "+(catKo[e.category]||"기회")):("A recurring "+t[e.category].toLowerCase()));return '<div class="rec-card cat-'+e.category+'" data-id="'+esc(e.id)+'"><div class="rc-top">'+tileHTML(e)+'<span class="pill '+s.key+'">'+esc(s.pill)+'</span></div><h4>'+esc(e.title)+'</h4><div class="rc-reason"><span class="rc-rl">'+esc(t.recWhy)+'</span>'+esc(reason)+'</div></div>';}).join("");
    document.getElementById("dueList").innerHTML=withD.slice(0,5).map(function(x){var e=x.e,s=x.s;var days=Math.max(0,Math.round((s.sort-today)/MS_DAY));return '<div class="due-row" data-id="'+esc(e.id)+'"><span class="due-d">D-'+days+'</span><div class="due-info"><div class="due-date">'+esc(shortWhen(e,s))+'</div><div class="due-name">'+esc(e.title)+'</div></div></div>';}).join("");
  }
  function buildStatic(){
    var t=UI[state.lang];
    document.getElementById("heroEyebrow").textContent=t.heroEyebrow;
    document.getElementById("heroH").innerHTML=t.heroH;
    document.getElementById("heroP").innerHTML=t.heroP;
    var ha=document.querySelector(".hero-art"); if(ha&&!ha.getAttribute("data-done")){ha.innerHTML=HERO_ART;ha.setAttribute("data-done","1");}
    var gh=document.getElementById("ghLink"); if(gh&&!gh.getAttribute("data-done")){gh.innerHTML=svg(ICONS.github);gh.setAttribute("data-done","1");}
    document.documentElement.lang=state.lang;
    document.getElementById("search").placeholder=t.searchPh;
    var tabs=[["all",t.tabHome]].concat(CATS.map(function(c){return [c,t[c]];}));
    document.getElementById("catNav").innerHTML=tabs.map(function(x){return '<button class="navtab '+(state.cat===x[0]?"active":"")+'" data-cat="'+x[0]+'">'+esc(x[1])+'</button>';}).join("");
    renderSpotlight();
    var cb=document.getElementById("ctaBanner"); if(cb) cb.innerHTML='<div class="cta-left"><span class="cta-ic">'+svg(ICONS.bell)+'</span><div><div class="cta-tt">'+esc(t.ctaTitle)+'</div><div class="cta-sub">'+esc(t.ctaSub)+'</div></div></div><button class="btn-light" id="ctaReco" type="button">'+esc(t.ctaBtn)+' ›</button>';
    var sorts=[["deadline",t.sortDeadline],["month",t.sortMonth],["name",t.sortName],["verified",t.sortVerified]];
    document.getElementById("sortsel").innerHTML=sorts.map(function(x){return '<option value="'+x[0]+'" '+(state.sort===x[0]?"selected":"")+'>'+esc(x[1])+'</option>';}).join("");
    var mopts='<option value="">'+esc(t.monthAny)+'</option>';
    for(var mm=1;mm<=12;mm++){mopts+='<option value="'+("0"+mm).slice(-2)+'" '+(state.month===("0"+mm).slice(-2)?"selected":"")+'>'+esc(MONTHS[state.lang][mm-1])+'</option>';}
    mopts+='<option value="~" '+(state.month==="~"?"selected":"")+'>'+esc(t.monthAnytime)+'</option>';
    document.getElementById("monthsel").innerHTML=mopts;
    var present={}; DATA.forEach(function(e){coarseOf(e).forEach(function(g){present[g]=1;});});
    var gkeys=GROUP_ORDER.filter(function(g){return present[g];});
    var fh='<span class="filterlabel">'+esc(t.fieldsLabel)+'</span>'+gkeys.map(function(g){return '<button class="chip fld '+(state.fields.indexOf(g)>=0?"on":"")+'" data-field="'+g+'">'+esc(GROUPS[g][state.lang])+'</button>';}).join("");
    var anyFilter=state.fields.length||state.careers.length||state.month||state.q||state.openOnly||state.koreaOnly||state.funded||state.membFree||state.cat!=="all";
    if(anyFilter) fh+='<button class="clearbtn" id="clearBtn">'+esc(t.clear)+'</button>';
    document.getElementById("rowFields").innerHTML=fh;
    document.getElementById("rowCareer").innerHTML='<span class="filterlabel">'+esc(t.careerLabel)+'</span>'+CGROUP_ORDER.map(function(g){return '<button class="chip cr '+(state.careers.indexOf(g)>=0?"on":"")+'" data-career="'+g+'">'+esc(CGROUPS[g][state.lang])+'</button>';}).join("");
    document.getElementById("rowToggles").innerHTML=
      '<button class="chip tog '+(state.openOnly?"on":"")+'" data-tog="openOnly">'+esc(t.togOpen)+'</button>'+
      '<button class="chip tog '+(state.korScope?"on":"")+'" data-tog="korScope">'+esc(t.korScope)+'</button>';
    document.getElementById("aboutTitle").textContent=t.aboutTitle;
    document.getElementById("aboutBody").textContent=t.aboutBody;
    document.getElementById("roleAdvisor").textContent=t.roleAdvisor;
    document.getElementById("affAdvisor").textContent=t.affAdvisor;
    document.getElementById("roleMaker").textContent=t.roleMaker;
    document.getElementById("affMaker").textContent=t.affMaker;
    document.getElementById("contribNote").textContent=t.contribNote;
    document.getElementById("foot").innerHTML=t.foot;
    document.querySelectorAll(".lang button").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-lang")===state.lang);});
  }

  document.addEventListener("click",function(ev){
    var el=ev.target;
    if(el.closest && el.closest("#recoModal")){
      var mm=document.getElementById("recoModal");
      if(el.matches(".rsc")){mm.querySelectorAll(".rsc").forEach(function(b){b.classList.remove("on");});el.classList.add("on");reco.scope=el.getAttribute("data-v");return;}
      if(el.matches(".rcar")){el.classList.toggle("on");var v=el.getAttribute("data-v");var i=reco.careers.indexOf(v);if(i>=0)reco.careers.splice(i,1);else reco.careers.push(v);return;}
      if(el.matches(".rfld")){el.classList.toggle("on");var v2=el.getAttribute("data-v");var j=reco.fields.indexOf(v2);if(j>=0)reco.fields.splice(j,1);else reco.fields.push(v2);return;}
      if(el.matches(".rcat")){mm.querySelectorAll(".rcat").forEach(function(b){b.classList.remove("on");});el.classList.add("on");reco.cat=el.getAttribute("data-v");return;}
      if(el.matches(".rtog")){el.classList.toggle("on");var k=el.getAttribute("data-k");reco[k]=!reco[k];return;}
      if(el.matches("#rRun")){runReco();return;}
      if(el.matches("#rClose")){closeReco();return;}
      var rrow=el.closest(".rrow"); if(rrow){closeReco();nav("#/o/"+rrow.getAttribute("data-id"));return;}
      if(el.matches("#recoModal")){closeReco();return;}
      return;
    }
    if(el.matches(".lang button")){state.lang=el.getAttribute("data-lang");buildStatic();if(document.getElementById("detail").style.display!=="none"){route();}else{render();}return;}
    if(el.matches("#recMore")||el.matches("#ctaReco")||(el.closest&&(el.closest("#recMore")||el.closest("#ctaReco")))){openReco();return;}
    if(el.matches("#dueAll")||(el.closest&&el.closest("#dueAll"))){state.sort="deadline";state.cat="all";buildStatic();render();var rr=document.getElementById("results");if(rr&&rr.scrollIntoView)rr.scrollIntoView({behavior:"smooth",block:"start"});return;}
    if(el.matches("#dback")){nav("");return;}
    if(el.matches("#shareBtn")){var b=el;var href=location.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(href).then(function(){b.textContent=UI[state.lang].shared;setTimeout(function(){b.textContent=b.getAttribute("data-def");},1500);});}return;}
    var rc=el.closest && el.closest(".relcard"); if(rc){nav("#/o/"+rc.getAttribute("data-id"));return;}
    if(el.matches("#brand")||(el.closest&&el.closest("#brand"))){nav("");return;}
    var rcd=el.closest&&el.closest(".rec-card"); if(rcd){nav("#/o/"+rcd.getAttribute("data-id"));return;}
    var drw=el.closest&&el.closest(".due-row"); if(drw){nav("#/o/"+drw.getAttribute("data-id"));return;}
    var ctab=el.closest&&el.closest("#catNav .navtab"); if(ctab){var cc=ctab.getAttribute("data-cat");state.cat=(state.cat===cc?"all":cc);buildStatic();render();return;}
    if(el.matches(".chip.fld")){var f=el.getAttribute("data-field");var i=state.fields.indexOf(f);if(i>=0)state.fields.splice(i,1);else state.fields.push(f);buildStatic();render();return;}
    if(el.matches(".chip.cr")){var c=el.getAttribute("data-career");var ic=state.careers.indexOf(c);if(ic>=0)state.careers.splice(ic,1);else state.careers.push(c);buildStatic();render();return;}
    if(el.matches(".chip.tog")){var k2=el.getAttribute("data-tog");state[k2]=!state[k2];buildStatic();render();return;}
    if(el.matches("#clearBtn")){state.fields=[];state.careers=[];state.month="";state.q="";state.openOnly=false;state.koreaOnly=false;state.funded=false;state.membFree=false;state.cat="all";document.getElementById("search").value="";buildStatic();render();return;}
    var card=el.closest && el.closest(".card"); if(card && !(el.closest&&el.closest("a"))){nav("#/o/"+card.getAttribute("data-id"));return;}
  });
  document.getElementById("search").addEventListener("input",function(e){state.q=e.target.value;render();});
  document.getElementById("sortsel").addEventListener("change",function(e){state.sort=e.target.value;render();});
  document.getElementById("monthsel").addEventListener("change",function(e){state.month=e.target.value;buildStatic();render();});

  buildStatic(); render();
  window.addEventListener("hashchange",route);
  route();
};
</script>
<script>fetch('./data.json').then(function(r){return r.json();}).then(function(d){window.DATA=d;window.__logos=true;window.__traceInit();}).catch(function(err){document.getElementById('results').innerHTML='<div class=\'empty\'>Failed to load data.json: '+err+'</div>';});</script>
